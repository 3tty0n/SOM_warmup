# -*- mode: yaml -*-
# SOM Experiment Benchmarks
#
# Large-scale benchmarks that run multiple SOM benchmarks in shuffled orders.
# Designed to evaluate JIT compilation behavior under diverse workloads.
#
# Usage:
#   This config provides benchmark suite definitions only.
#   Each SOM implementation should either:
#     1. Import these suites in their own rebench config, or
#     2. Copy and adapt the executor/experiment sections below.
#
# Prerequisites:
#   The SOM implementation's classpath must include:
#     - Smalltalk (standard library)
#     - Benchmark classes: NBody, Json, DeltaBlue, CD, Bounce, BubbleSort,
#       Fannkuch, Mandelbrot, PageRank, Permute, Queens, QuickSort,
#       Sieve, Storage, Towers, TreeSort
#     - BenchmarkHarness

default_experiment: all
default_data_file: 'experiment.data'

runs:
  max_invocation_time: 6000
  min_iteration_time: 1

# Benchmark classpath components that SOM implementations typically need.
# Adjust these paths to match your project layout.
#
# Example classpath:
#   -cp Smalltalk:Examples/Benchmarks:Examples/Benchmarks/NBody:Examples/Benchmarks/Json:Examples/Benchmarks/DeltaBlue:Examples/Benchmarks/CD

benchmark_suites:
    experiment-shuffle:
      gauge_adapter: PlainSecondsLog
      command: " -cp %(classpath)s %(benchmark_dir)s/Experiment/%(benchmark)s.som"
      invocations: 500
      benchmarks:
        - Experiment1
        - Experiment2
        - Experiment3
        - Experiment4
        - Experiment5
        - Experiment6
        - Experiment7
        - Experiment8
        - Experiment9
        - Experiment10
        - Experiment11
        - Experiment12
        - Experiment13
        - Experiment14
        - Experiment15
        - Experiment16
        - Experiment17
        - Experiment18
        - Experiment19
        - Experiment20
        - ExperimentRandom

    experiment-stable:
      gauge_adapter: PlainSecondsLog
      command: " -cp %(classpath)s %(benchmark_dir)s/ExperimentStable/%(benchmark)s.som %(iterations)s"
      invocations: 500
      iterations: 100
      benchmarks:
        - ExperimentStable1
        - ExperimentStable2
        - ExperimentStable3
        - ExperimentStable4
        - ExperimentStable5
        - ExperimentStable6
        - ExperimentStable7
        - ExperimentStable8
        - ExperimentStable9
        - ExperimentStable10
        - ExperimentStable11
        - ExperimentStable12
        - ExperimentStable13
        - ExperimentStable14
        - ExperimentStable15
        - ExperimentStable16
        - ExperimentStable17
        - ExperimentStable18
        - ExperimentStable19
        - ExperimentStable20

# Example executor configuration (adapt for your SOM implementation):
#
# executors:
#     MySOM:
#         path: .
#         executable: som
#
# experiments:
#     all:
#         executions:
#           - MySOM:
#               suites:
#                 - experiment-shuffle
#                 - experiment-stable
